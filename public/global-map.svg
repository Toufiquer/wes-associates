<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Global map</title>
  <desc id="desc">A grayscale vector world map with dark land masses, pale ocean, country-style borders, and soft shadows.</desc>
  <defs>
    <radialGradient id="ocean" cx="50%" cy="9%" r="88%">
      <stop offset="0%" stop-color="#f3f3f3"/>
      <stop offset="42%" stop-color="#d8d8d8"/>
      <stop offset="100%" stop-color="#a7a7a7"/>
    </radialGradient>
    <filter id="landShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="10" dy="16" stdDeviation="12" flood-color="#111" flood-opacity=".45"/>
      <feDropShadow dx="-5" dy="-5" stdDeviation="4" flood-color="#fff" flood-opacity=".52"/>
    </filter>
    <filter id="coastGlow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#e6e6e6" flood-opacity=".9"/>
    </filter>
    <style>
      .land{fill:#252323;stroke:#d8d8d8;stroke-width:2.1;stroke-linejoin:round;filter:url(#landShadow)}
      .island{fill:#252323;stroke:#d8d8d8;stroke-width:1.8;stroke-linejoin:round;filter:url(#landShadow)}
      .border{fill:none;stroke:#9d9d9d;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;opacity:.86;filter:url(#coastGlow)}
      .thin{stroke-width:1.45;opacity:.72}
    </style>
  </defs>
  <rect width="1920" height="1080" fill="url(#ocean)"/>

